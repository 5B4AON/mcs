<div class="emoji-edit-overlay" (click)="cancel()">
  <div class="emoji-edit-dialog" (click)="$event.stopPropagation()" role="dialog"
       aria-label="Edit Emoji Mapping">

    <!-- Header -->
    <div class="emoji-edit-header">
      <h3>{{ editIndex >= 0 ? 'Edit' : 'Add' }} Emoji Mapping</h3>
      <button type="button" class="close-btn" (click)="cancel()" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Body -->
    <div class="emoji-edit-body">
      <!-- Trigger pattern -->
      <div class="emoji-edit-field">
        <label class="emoji-edit-label" for="emojiEditMatch">Trigger</label>
        <input id="emojiEditMatch" type="text" class="emoji-edit-input mono"
               [(ngModel)]="editMatch" placeholder="e.g. 73, <AR>, CQ"
               maxlength="20" (keydown.enter)="save()" (keydown.escape)="cancel()">
        <span class="emoji-edit-hint">Character sequence or prosign that triggers replacement</span>
      </div>

      <!-- Replacement text -->
      <div class="emoji-edit-field">
        <label class="emoji-edit-label" for="emojiEditEmoji">Replacement</label>
        <div class="emoji-edit-input-group">
          <input #emojiInput id="emojiEditEmoji" type="text" class="emoji-edit-input emoji-text"
                 [(ngModel)]="editEmoji" placeholder="😊 or any text"
                 maxlength="40" (keydown.enter)="save()" (keydown.escape)="cancel()">
          <button type="button" class="picker-btn" (click)="openPicker()" title="Pick emoji">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
        </div>
        <span class="emoji-edit-hint">Emojis, characters, or any mix — replaces the trigger in display</span>
      </div>

      <!-- Description -->
      <div class="emoji-edit-field">
        <label class="emoji-edit-label" for="emojiEditMeaning">Description <span class="optional">(optional)</span></label>
        <input id="emojiEditMeaning" type="text" class="emoji-edit-input"
               [(ngModel)]="editMeaning" placeholder="e.g. Best regards"
               maxlength="40" (keydown.enter)="save()" (keydown.escape)="cancel()">
      </div>

      <!-- Error -->
      @if (error) {
        <div class="emoji-edit-error">{{ error }}</div>
      }
    </div>

    <!-- Actions -->
    <div class="emoji-edit-actions">
      @if (editIndex >= 0) {
        <button type="button" class="action-btn delete-btn" (click)="delete()" title="Delete this mapping">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
      }
      <span class="actions-spacer"></span>
      <button type="button" class="action-btn cancel-btn" (click)="cancel()">Cancel</button>
      <button type="button" class="action-btn save-btn" (click)="save()">OK</button>
    </div>
  </div>
</div>

@if (showPicker) {
  <app-emoji-picker
    (emojiSelected)="onPickerSelected($event)"
    (closed)="closePicker()">
  </app-emoji-picker>
}
